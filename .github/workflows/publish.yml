name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Verify signed release tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: bash .github/scripts/verify-release-tag.sh

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.17"
          python-version: "3.10"

      - name: Verify tag matches pyproject version
        env:
          TAG: ${{ github.ref_name }}
        run: bash .github/scripts/verify-tag-version.sh

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run tests
        run: uv run pytest --cov

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Build
        run: uv build

      - name: Generate provenance subjects
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum *.tar.gz *.whl | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1

      - name: Generate SBOM
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          mkdir -p sbom
          uv export --format cyclonedx1.5 --frozen --no-dev \
            --preview-features sbom-export \
            -o "sbom/mkdocs-source-links-${VERSION}.cdx.json"

      - name: Upload distribution archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: |
            dist/*.tar.gz
            dist/*.whl
            sbom/*.cdx.json
          if-no-files-found: error
          retention-days: 5

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    # Must be pinned by version tag, NOT a commit SHA: the generic generator downloads its prebuilt,
    # signed builder binary by release tag (refs/tags/vX.Y.Z) and rejects a SHA ref ("Invalid ref ...
    # Expected ref of the form refs/tags/vX.Y.Z"), which is what broke the v0.7.0 release.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      provenance-name: mkdocs-source-links.intoto.jsonl

  release-assets:
    name: Create GitHub release with assets
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download distribution archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: .

      - name: Download SLSA provenance
        env:
          GH_TOKEN: ${{ github.token }}
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: gh run download "${GITHUB_RUN_ID}" -R "${GITHUB_REPOSITORY}" -n "$PROVENANCE"

      - name: Create GitHub release with provenance and distributions
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: bash .github/scripts/create-github-release.sh

  slsa-verifier:
    name: Verify SLSA provenance
    needs: [build, provenance, release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: |
          set -euo pipefail
          gh -R "$GITHUB_REPOSITORY" release download "$GITHUB_REF_NAME" \
            -p "$PROVENANCE" -p "*.tar.gz" -p "*.whl"

      - name: Verify provenance
        env:
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: |
          set -euo pipefail
          slsa-verifier verify-artifact \
            --provenance-path "$PROVENANCE" \
            --source-uri "github.com/${GITHUB_REPOSITORY}" \
            --source-tag "$GITHUB_REF_NAME" \
            *.tar.gz *.whl
