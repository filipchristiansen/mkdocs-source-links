name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Verify signed release tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TYPE=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.type')
          if [ "$TYPE" != "tag" ]; then
            echo "::error::Release tag ${TAG} must be a signed annotated tag (git tag -s), not a lightweight tag."
            exit 1
          fi
          SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha')
          VERIFIED=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${SHA}" --jq '.verification.verified')
          REASON=$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${SHA}" --jq '.verification.reason')
          if [ "$VERIFIED" != "true" ]; then
            echo "::error::Release tag ${TAG} is not cryptographically verified (reason: ${REASON}). Use git tag -s with a key registered on GitHub."
            exit 1
          fi
          echo "Tag ${TAG} is verified (${REASON})."

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          python-version: "3.10"

      - name: Build
        run: uv build

      - name: Generate provenance subjects
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum *.tar.gz *.whl | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

      - name: Upload distribution archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: |
            dist/*.tar.gz
            dist/*.whl
          if-no-files-found: error
          retention-days: 5

  provenance:
    needs: [build]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      provenance-name: mkdocs-source-links.intoto.jsonl

  release-assets:
    name: Create GitHub release with assets
    needs: [build, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download distribution archives
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: dist
          path: dist

      - name: Download SLSA provenance
        env:
          GH_TOKEN: ${{ github.token }}
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: gh run download "${GITHUB_RUN_ID}" -R "${GITHUB_REPOSITORY}" -n "$PROVENANCE"

      - name: Create GitHub release with provenance and distributions
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release ${TAG} already exists; delete it before re-publishing."
            exit 1
          fi
          VERSION="${TAG#v}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$NOTES" | tr -d '[:space:]')" ]; then
            echo "::error::No CHANGELOG section found for ${VERSION}."
            exit 1
          fi
          gh release create "$TAG" \
            "$PROVENANCE" \
            dist/*.tar.gz \
            dist/*.whl \
            --title "$TAG" \
            --notes "$NOTES"

  slsa-verifier:
    name: Verify SLSA provenance
    needs: [build, provenance, release-assets]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6 # v2.7.1

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: |
          set -euo pipefail
          gh -R "$GITHUB_REPOSITORY" release download "$GITHUB_REF_NAME" \
            -p "$PROVENANCE" -p "*.tar.gz" -p "*.whl"

      - name: Verify provenance
        env:
          PROVENANCE: ${{ needs.provenance.outputs.provenance-name }}
        run: |
          set -euo pipefail
          slsa-verifier verify-artifact \
            --provenance-path "$PROVENANCE" \
            --source-uri "github.com/${GITHUB_REPOSITORY}" \
            --source-tag "$GITHUB_REF_NAME" \
            *.tar.gz *.whl
