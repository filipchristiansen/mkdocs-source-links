name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Force uv to use managed CPython installs so cache-python actually caches the interpreter
env:
  UV_PYTHON_PREFERENCE: only-managed

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          python-version: "3.10"
          enable-cache: true
          cache-python: true
          cache-suffix: lint

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Cache pre-commit environments
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      # Single source of truth: run the same hooks as `make lint` locally.
      - name: Run pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          python-version: "3.10"
          enable-cache: true
          cache-python: true
          cache-suffix: audit

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: pip-audit
        run: uv run pip-audit -l --desc on

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Cover path handling (Path.resolve, as_posix, drive letters) on other OSes,
        # against the newest supported Python only to keep the matrix small.
        include:
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-python: true
          cache-suffix: test

      - name: Install dependencies
        run: uv sync --group dev --frozen

      # Coverage only on ubuntu 3.10 (uploaded to Codecov); other jobs run tests only.
      - name: Pytest
        run: uv run pytest ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' && '--cov --cov-report=xml' || '' }}

      # Uses the token for pushes/same-repo PRs; falls back to tokenless uploads on fork PRs
      # (where secrets are unavailable). fail_ci_if_error stays false so an occasional
      # flaky/tokenless upload never blocks a merge.
      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
