version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - chore
    # One weekly PR for all Actions pins (keeps codeql-action init/analyze in sync).
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Library project: only update the lockfile, leave pyproject.toml constraints alone.
    versioning-strategy: lockfile-only
    labels:
      - chore
    # One weekly PR for all lockfile bumps.
    groups:
      uv:
        patterns:
          - "*"
