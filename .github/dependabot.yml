version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - chore

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
    # Library project: only update the lockfile, leave pyproject.toml constraints alone.
    versioning-strategy: lockfile-only
    labels:
      - chore
